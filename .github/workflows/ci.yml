name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  core-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          cd python/core
          uv sync --extra dev
      - name: Ruff
        run: cd python/core && uv run ruff check src tests
      - name: Black
        run: cd python/core && uv run black --check src tests
      - name: Isort
        run: cd python/core && uv run isort --check-only src tests

  core-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: cd python/core && uv sync --extra dev
      - name: Mypy
        run: cd python/core && uv run mypy src

  core-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: cd python/core && uv sync --extra dev
      - name: Bandit
        run: cd python/core && uv run bandit -r src -q -ll

  core-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: goderash
          POSTGRES_PASSWORD: goderash
          POSTGRES_DB: goderash_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: cd python/core && uv sync --extra dev
      - name: Run tests
        env:
          JWT_SECRET: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_API_KEY: gdr_admin_ci_1234567890
          DATABASE_URL: postgresql+asyncpg://goderash:goderash@localhost:5432/goderash_test
          GODERASH_ENV: dev
        run: cd python/core && uv run pytest --tb=short -q

  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: cd python/goderash_sdk && uv sync --extra dev
      - name: Lint
        run: cd python/goderash_sdk && uv run ruff check src tests
      - name: Tests
        run: cd python/goderash_sdk && uv run pytest --tb=short -q

  sdk-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r build

  docker-build:
    runs-on: ubuntu-latest
    needs: [core-lint, core-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.core
          push: false
          tags: goderash/core:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
