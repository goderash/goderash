# Template only. Copy to secret.yaml, fill values, then:
#   kubectl apply -f infra/k8s/secret.yaml
# DO NOT COMMIT secret.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: goderash-secrets
  namespace: goderash
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_AT_LEAST_32_RANDOM_CHARS"
  ADMIN_API_KEY: "gdr_admin_REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE"
  # DATABASE_URL must embed the same POSTGRES_PASSWORD value above.
  DATABASE_URL: "postgresql+asyncpg://goderash:REPLACE@goderash-postgres:5432/goderash"
  REDIS_URL: "redis://goderash-redis:6379/0"
