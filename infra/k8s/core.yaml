apiVersion: apps/v1
kind: Deployment
metadata:
  name: goderash-core
  namespace: goderash
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: goderash-core
  template:
    metadata:
      labels:
        app: goderash-core
    spec:
      containers:
        - name: core
          image: ghcr.io/goderash/goderash-core:latest
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: goderash-config
            - secretRef:
                name: goderash-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: goderash-core
  namespace: goderash
spec:
  selector:
    app: goderash-core
  ports:
    - name: http
      port: 80
      targetPort: 8000
