name: goderash

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: goderash
      POSTGRES_PASSWORD: goderash
      POSTGRES_DB: goderash
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goderash"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.core
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://goderash:goderash@postgres:5432/goderash
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn goderash_core.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../../python/core/src:/app/src
      - pack-output:/app/data/packs

volumes:
  postgres-data:
  redis-data:
  pack-output:
